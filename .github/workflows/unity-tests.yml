name: Unity Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    name: EditMode Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Run EditMode Tests
        uses: game-ci/unity-test-runner@v4
        id: tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: 2022.3.53f1c1
          testMode: editmode
          customParameters: -assemblyNames Tests
          artifactsPath: TestResults
          coverageOptions: >
            generateAdditionalMetrics;
            generateHtmlReport;
            assemblyFilters:+UIDataRender

      - name: Enforce UIDataRender coverage gate
        shell: pwsh
        run: .\Tools\Test-CoverageGate.ps1 -SummaryPath "CodeCoverage/Report/Summary.xml" -AssemblyName "UIDataRender" -MinimumLineCoverage 70

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: CodeCoverage
